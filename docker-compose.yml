# Local Elasticsearch for the aggregator's symbol search.
#
#   docker compose up -d
#   ELASTICSEARCH_URL=http://localhost:9200 pnpm dev
#
# The /api/search and /api/graphql routes create the `symbols` index and bulk-
# load it on the first query (see api/_lib/es.ts → esIndexIfNeeded), so there is
# no separate load step — just point ELASTICSEARCH_URL at this node and search.
# When ELASTICSEARCH_URL is unset the routes transparently use the in-memory
# BM25 ranker instead, so this is entirely optional for local development.
#
# Single-node, security disabled — for LOCAL DEV ONLY. Production uses a managed
# cluster (Elastic Cloud) configured via the Vercel project environment.
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: go-aggregator-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ingest.geoip.downloader.enabled=false
    ports:
      - '9200:9200'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - es-data:/usr/share/elasticsearch/data

volumes:
  es-data:
