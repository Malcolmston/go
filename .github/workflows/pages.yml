name: Pages

# Builds the React (TypeScript + Tailwind) landing site (at the repo root) and publishes it
# to GitHub Pages. Enable with Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # The library submodules are the source gendocs reads to build each
          # library's inline API reference.
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22.6+ so the graph generator (scripts/build-graph-data.ts) runs
          # under native TypeScript stripping (--experimental-strip-types).
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Best-effort: move each submodule to the tip of its default branch so the
      # aggregator's inline API docs are current rather than pinned. If this
      # fails (network, no tracking branch), gendocs still runs over the pinned
      # checkout, so the docs are never worse than the committed snapshot.
      - name: Freshen library submodules
        run: git submodule update --remote --recursive || true

      # Regenerate one DocIndex JSON per library (public/docs/<lib>.json),
      # the full Go API reference the /go landing renders inline under each
      # library's "API reference" section (via the shared DocsApp renderer).
      # Run from inside gendocs (its own stdlib-only module) with GOWORK=off so
      # it does not depend on the git-ignored go.work.
      - name: Generate per-library API docs
        run: cd gendocs && GOWORK=off go run . -root .. -out ../public/docs

      # Regenerate the LIVE parity scores from every submodule's parity.json
      # (the metric each port's parity pipeline publishes), so the landing's
      # per-library parity badges and the "Upstream parity & pipeline" section
      # always reflect the current audited numbers rather than a hand-edited
      # snapshot.
      - name: Generate live parity metrics
        run: cd genparity && GOWORK=off go run . -root .. -out ../src/parity.ts

      # Regenerate the search index + package-connection graph (public/
      # graph.json + search-index.json) that the Explore tab falls back to when
      # the serverless search/GraphQL API isn't reachable (as on GitHub Pages).
      - name: Generate search + package-graph data
        run: node --experimental-strip-types scripts/build-graph-data.ts

      # Build the Next.js static export. GITHUB_PAGES=true switches
      # next.config.mjs to `output: 'export'` (emitting out/) with
      # basePath '/go'; NEXT_PUBLIC_BASE_PATH=/go makes client fetch()s and
      # asset links resolve under the /go project-pages prefix.
      - name: Build site
        env:
          FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN }}
        run: |
          pnpm install --frozen-lockfile
          # Static export can't include the dynamic /api route handlers (they run
          # only on Vercel). GitHub Pages uses the bundled graph/search fallback,
          # so exclude app/api for the export build, then restore it.
          mv app/api .api-routes-tmp
          GITHUB_PAGES=true NEXT_PUBLIC_BASE_PATH=/go pnpm run build
          mv .api-routes-tmp app/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
