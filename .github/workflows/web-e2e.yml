name: Web e2e

# Playwright end-to-end tests for the landing site across the device matrix.
#
# Pull requests run a small, representative device SUBSET (E2E_SUBSET=1) across
# 2 shards to keep PR wall-clock low. Pushes to main and the nightly schedule
# run the full 100+ device matrix across 4 shards for exhaustive coverage.

on:
  pull_request:
    paths: ["app/**", "src/**", "tests/**", "public/**", "ui/**", "package.json", "pnpm-lock.yaml", "next.config.mjs", "tsconfig*.json", "playwright.config.ts", ".eslintrc.json", ".github/workflows/web-e2e.yml"]
  push:
    branches: ["main"]
    paths: ["app/**", "src/**", "tests/**", "public/**", "ui/**", "package.json", "pnpm-lock.yaml", "next.config.mjs", "tsconfig*.json", "playwright.config.ts", ".eslintrc.json", ".github/workflows/web-e2e.yml"]
  schedule:
    # Nightly full-matrix sweep (06:00 UTC).
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Compute the run shape once: PRs get the subset + 2 shards, everything else
  # (main pushes, nightly, manual) gets the full matrix + 4 shards.
  config:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.plan.outputs.shards }}
      total: ${{ steps.plan.outputs.total }}
      subset: ${{ steps.plan.outputs.subset }}
    steps:
      - id: plan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'shards=[1,2]' >> "$GITHUB_OUTPUT"
            echo 'total=2' >> "$GITHUB_OUTPUT"
            echo 'subset=1' >> "$GITHUB_OUTPUT"
          else
            echo 'shards=[1,2,3,4]' >> "$GITHUB_OUTPUT"
            echo 'total=4' >> "$GITHUB_OUTPUT"
            echo 'subset=0' >> "$GITHUB_OUTPUT"
          fi

  playwright:
    needs: config
    name: Playwright E2E (shard ${{ matrix.shard }}/${{ needs.config.outputs.total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.config.outputs.shards) }}
    env:
      E2E_SUBSET: ${{ needs.config.outputs.subset }}
      FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with: { submodules: true }
      - uses: actions/setup-go@v7
        with: { go-version: "1.24", cache: true }
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E (shard ${{ matrix.shard }}/${{ needs.config.outputs.total }})
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ needs.config.outputs.total }}
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7
