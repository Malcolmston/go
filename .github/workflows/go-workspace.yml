name: Workspace

# Proves the libraries compose: builds and vets the cross-module go.work
# integration example (examples/integration) with every library submodule.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    name: workspace build (cross-module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: false
      # go.work is gitignored (a local-dev convention), so recreate it here.
      # The example requires the libraries at v0.0.0, which only resolve through
      # the workspace's `use` directives pointing at the submodule checkouts.
      - name: Set up the Go workspace
        run: go work init ./express ./passport ./socket.io ./chalk ./morgan ./fastmcp ./streamlit ./algebra ./opencv ./examples/integration
      - name: Build the integration example
        run: go build ./examples/integration
      - name: Vet the integration example
        run: go vet ./examples/integration
