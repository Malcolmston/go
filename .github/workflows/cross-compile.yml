name: Cross-compile

# Builds the cross-module integration example for every OS/arch we claim to
# support, proving the whole family composes and links on each platform.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - name: Set up the Go workspace
        run: go work init ./express ./passport ./socket.io ./chalk ./morgan ./examples/integration
      - name: Build the integration example
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build ./examples/integration
