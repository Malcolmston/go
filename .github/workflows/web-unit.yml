name: Web unit

# Vitest component tests for the landing site (repo root) and its vendored go-ui
# shared library (a git submodule).

on:
  pull_request:
    paths: ["app/**", "src/**", "ui/**", "package.json", "pnpm-lock.yaml", "tsconfig*.json", "vitest.config.ts", ".github/workflows/web-unit.yml"]
  push:
    branches: ["main"]
    paths: ["app/**", "src/**", "ui/**", "package.json", "pnpm-lock.yaml", "tsconfig*.json", "vitest.config.ts", ".github/workflows/web-unit.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vitest:
    name: Vitest component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: true }
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        env:
          FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN }}
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck && pnpm run typecheck:tests
      - name: Unit tests
        run: pnpm run test
