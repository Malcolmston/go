name: Supply chain

# Trivy filesystem scan for known vulnerabilities, embedded secrets, and
# misconfiguration across the repository (a lightweight "malware"/supply-chain
# sweep). Report-only so it never blocks; findings surface in the run log and
# job summary. Runs on push to main, weekly, and on demand.

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
