name: Sync submodules

# Keeps this aggregator repo pointed at the latest main of every library
# submodule. Fires instantly when a library pushes to main (via a
# repository_dispatch from that library's "Notify go" workflow), on manual
# dispatch, and hourly as a fallback so it stays current even without a token.

on:
  repository_dispatch:
    types: [library-updated]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-submodules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Top-level submodules only — NOT recursive. Each library vendors the
      # shared UI as web/vendor/go, which points back at this aggregator repo,
      # so the submodule graph is cyclic (go → opencv → go → …). Recursing into
      # it makes checkout and `submodule update` walk that cycle until the job
      # exhausts and fails. The aggregator's Go workspace build only needs the
      # library modules themselves, so the nested web/vendor/go is irrelevant.
      - name: Checkout with submodules
        uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules to each library's latest main
        # Explicit library paths, no --recursive, so the cyclic web/vendor/go
        # nested submodules are never touched.
        run: git submodule update --remote express passport socket.io chalk morgan fastmcp streamlit algebra opencv

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # go.work is gitignored, so recreate it before building — the example
      # requires the libraries at v0.0.0, which only resolve via the workspace.
      - name: Set up the Go workspace
        run: go work init ./express ./passport ./socket.io ./chalk ./morgan ./fastmcp ./streamlit ./algebra ./opencv ./examples/integration

      - name: Validate the workspace still builds against latest
        run: go build ./examples/integration

      - name: Commit & push if any pointer moved
        run: |
          if git diff --quiet; then
            echo "Submodules already up to date — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          msg="chore: bump library submodules to latest main"
          if [ -n "${{ github.event.client_payload.repo }}" ]; then
            msg="$msg (triggered by ${{ github.event.client_payload.repo }})"
          fi
          git commit -m "$msg"
          git push
